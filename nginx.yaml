- name : install and run nginx server
  hosts : web
  become: yes #equal to -b in adhoc command ,getting the root access
  tasks:
    - name: install nginx
      ansible.builtin.dnf:
        name: nginx
        state: latest
    - name: start nginx
      ansible.builtin.service:
       name: nginx
       state: started
       enabled: yes
    - name: enabled nginx
      ansible.builtin.service:
      name: nginx
      state: enabled
      

