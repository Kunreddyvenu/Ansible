- name: some install and some unistall from items
  hosts: localhost
  become: yes
  tasks:
  - name: sql install remain uninstall
    ansible.builtin.dnf:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:
    - { name: 'mysql', state: 'latest'}
    - { name: 'nginx', state: 'absent'}
    - { name: 'postfix', state: 'absent'}

   